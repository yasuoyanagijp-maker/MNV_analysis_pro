# Streamlit Configuration for Retinal Analysis Pro
# Windows/PyInstaller compatible

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
maxUploadSize = 200
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
magicEnabled = false

[client]
showErrorDetails = true
